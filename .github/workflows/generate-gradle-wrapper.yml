name: Generate Gradle Wrapper JAR
on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Install Gradle
        run: |
          sudo apt-get update
          sudo apt-get install -y gradle
          gradle --version

      - name: Generate Gradle Wrapper
        run: |
          # Run gradle wrapper to produce gradle-wrapper.jar
          if [ -f build.gradle ] || [ -f build.gradle.kts ]; then
            gradle wrapper || true
          else
            echo "No Gradle build files found in repo root; attempting in app/"
            cd app || exit 0
            gradle wrapper || true
          fi

      - name: Show wrapper files
        run: |
          ls -la gradle/wrapper || true
          ls -la app/gradle/wrapper || true

      - name: Commit wrapper jar if present
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if [ -f gradle/wrapper/gradle-wrapper.jar ]; then
            git add gradle/wrapper/gradle-wrapper.jar
          fi
          if [ -f app/gradle/wrapper/gradle-wrapper.jar ]; then
            git add app/gradle/wrapper/gradle-wrapper.jar
          fi
          git status --porcelain
          if [ -n "$(git status --porcelain)" ]; then
            git commit -m "Add gradle-wrapper.jar generated by workflow"
            git push
          else
            echo "No changes to commit"
          fi
